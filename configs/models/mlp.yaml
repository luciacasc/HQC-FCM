experiment:
  name: mlp_motivated
  save_dir: results/mlp_motivated
  seed: 42

data:
  train_csv: data/generated/train_motivated.csv
  test_csv: data/generated/test_motivated.csv
  n_train: 100
  n_test: 30

model:
  model_type: mlp
  n_concepts: 3
  hidden_dims: [16, 16]
  use_bias: false   # optional, default false (matches the original MLP baseline)

training:
  lr: 0.005
  n_epochs: 300
  batch_size: 8
  patience: 75
  lambda_l1: 1.0e-5

verbose: true

W_true:
  - [0.0, 0.0, 0.0]
  - [0.6, 0.0, 0.0]
  - [-0.4, 0.5, 0.0]
